name: Publish Maven S3 Split Resolver

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      
      - name: Get version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Build JAR
        run: mvn clean package -DskipTests
      
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: maven-s3-split-resolver
          path: target/maven-s3-split-resolver-${{ steps.version.outputs.version }}.jar
          retention-days: 7
      
      - name: Create Release Asset
        if: github.event_name == 'release'
        working-directory: target
        run: |
          mv maven-s3-split-resolver-${{ steps.version.outputs.version }}.jar maven-s3-split-resolver.jar
      
      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: target/maven-s3-split-resolver.jar
          asset_name: maven-s3-split-resolver.jar
          asset_content_type: application/java-archive
