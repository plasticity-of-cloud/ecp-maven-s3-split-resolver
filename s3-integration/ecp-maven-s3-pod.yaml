apiVersion: v1
kind: Pod
metadata:
  name: ecp-maven-s3
  namespace: elastic-cicd
  labels:
    app: ecp-maven-s3
    component: ci-cd
spec:
  restartPolicy: Never  
  nodeSelector:
    node-type: karpenter-worker
  tolerations:
  - key: "spot"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    runAsNonRoot: true
  containers:
  - name: maven-builder
    #image: public.ecr.aws/docker/library/maven:3.9-amazoncorretto-21
    #image: public.ecr.aws/docker/library/maven:3.9-amazoncorretto-21-al2023
    image: 864899852480.dkr.ecr.ap-south-1.amazonaws.com/docker/library/maven:3.9-amazoncorretto-21-al2023-s3
    imagePullPolicy: Always
    command: ["/bin/bash", "-c"]
    args:
    - |
      echo "Maven S3 integration pod started"
      java -version
      echo "Sleeping indefinitely..."
      sleep infinity
    env:
    - name: HOME
      value: /home/maven
    - name: USER
      value: maven
    - name: MAVEN_CONFIG
      value: /home/maven/.m2
    - name: MAVEN_OPTS
      value: "-Xmx1536m -Xms512m -Dmaven.repo.local=/home/maven/.m2-metadata/repository-metadata -Ds3.resolver.artifactDir=/home/maven/.m2/repository"
    resources:
      requests:
        cpu: "2"
        memory: "2Gi"
      limits:
        cpu: "3"
        memory: "4Gi"
    volumeMounts:
    - name: maven-home
      mountPath: /home/maven
    - name: workspace
      mountPath: /workspace
    - name: maven-cache-s3
      mountPath: /home/maven/.m2/repository
    - name: maven-metadata
      mountPath: /home/maven/.m2-metadata/repository-metadata
    workingDir: /workspace
  volumes:
  - name: workspace
    ephemeral:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: ebs-sc
          resources:
            requests:
              storage: 10Gi
  # S3 Mountpoint for immutable JARs
  - name: maven-cache-s3
    persistentVolumeClaim:
      claimName: ecp-maven-s3-pvc
  # EmptyDir for Maven metadata files that need in-place updates
  - name: maven-metadata
    emptyDir: {}
  # EmptyDir for /home/maven — writable home for uid 1000
  - name: maven-home
    emptyDir: {}
